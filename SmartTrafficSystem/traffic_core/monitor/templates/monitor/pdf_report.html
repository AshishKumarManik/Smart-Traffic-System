<!DOCTYPE html>
<html>
<head>
    <style>
        @page { size: a4; margin: 1cm; }
        body { font-family: Helvetica, Arial, sans-serif; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #4A90E2; color: white; padding: 10px; border: 1px solid #ccc; }
        td { padding: 8px; border: 1px solid #ccc; text-align: left; }
        .total-section { margin-top: 20px; text-align: right; font-size: 16pt; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>TRAFFIC VIOLATION REPORT</h1>
        <p>Generated on: {{ generated_at }}</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Plate Number</th>
                <th>Vehicle Type</th>
                <th>Fine (INR)</th>
            </tr>
        </thead>
        <tbody>
            {% for v in violations %}
            <tr>
                <td>{{ v.id }}</td>
                <td>{{ v.plate_number }}</td>
                <td>{{ v.vehicle_type }}</td>
                <td>{{ v.fine_amount }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" style="text-align: center;">No violations found in database.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="total-section">
        Total Revenue: ₹{{ total_fines }}
    </div>
</body>
</html>
